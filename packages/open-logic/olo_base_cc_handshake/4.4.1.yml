name: olo_base_cc_handshake
namespace: open-logic
version: 4.4.1
description: This is a very basic clock crossing that allows passing of data with
  the commonly used Valid/Ready handshake. The clock crossing is not meant to achieve
  high-performance but to be simple and safe.
license: ''
source:
  type: git
  url: https://github.com/open-logic/open-logic.git
  tag: 4.4.1
  ip_yml_path: .
routertl_compat:
  language: vhdl-2008
  library: olo
  files:
  - src/base/vhdl/olo_base_pkg_attribute.vhd
  - src/base/vhdl/olo_base_cc_bits.vhd
  - src/base/vhdl/olo_base_cc_reset.vhd
  - src/base/vhdl/olo_base_cc_pulse.vhd
  - src/base/vhdl/olo_base_cc_simple.vhd
  - src/base/vhdl/olo_base_cc_handshake.vhd
