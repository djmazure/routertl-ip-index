name: olo_base_cc_handshake
namespace: open-logic
version: 4.4.1
description: This is a very basic clock crossing that allows passing of data with
  the commonly used Valid/Ready handshake. The clock crossing is not meant to achieve
  high-performance but to be simple and safe.
