name: Regenerate catalog.json

on:
  push:
    paths:
      - "packages/**"

jobs:
  catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyyaml
      - run: python generate_catalog.py
      - name: Commit updated catalog
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate catalog.json"
          file_pattern: catalog.json
