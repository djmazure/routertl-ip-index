# RouteRTL IP Index — Registry
#
# Human-curated list of HDL repos to index. The CI action runs
# scan_ip_repo.py for each entry, auto-generating catalog.json
# and per-package version YAMLs.
#
# To add a new library:
#   1. Add an entry below
#   2. Push to main — CI scans and indexes automatically
#
# Fields:
#   namespace:   Index namespace (e.g. open-logic)
#   url:         Git clone URL
#   tag:         Git tag to index (update to re-scan at new version)
#   license:     SPDX license identifier
#   description: One-line description for the namespace

registries:
  - namespace: open-logic
    url: https://github.com/open-logic/open-logic.git
    tag: "4.4.1"
    license: LGPL-2.1-or-later
    description: "Vendor-independent FPGA standard library — FIFOs, CDCs, arbiters, AXI"

  - namespace: djmazure
    url: https://github.com/djmazure/cameralink_controller.git
    tag: main
    license: MIT
    description: "CameraLink controller for Xilinx UltraScale devices"

  - namespace: alexforencich
    url: https://github.com/alexforencich/verilog-axi.git
    tag: master
    license: MIT
    description: "AXI4, AXI4-Lite, AXI4-Stream — crossbar, DMA, FIFO, adapter, interconnect"

  - namespace: alexforencich
    url: https://github.com/alexforencich/verilog-ethernet.git
    tag: master
    license: MIT
    description: "Ethernet MAC, PHY, UDP/IP stack — 1G/10G/25G, RGMII, XGMII, PTP"

  - namespace: enclustra
    url: https://github.com/enclustra/en_cl_fix.git
    tag: "2.3.0"
    license: MIT
    description: "Fixed-point arithmetic — resize, round, saturate"

  - namespace: vunit
    url: https://github.com/VUnit/vunit.git
    tag: v4.7.1
    license: MPL-2.0
    description: "VHDL/SV verification framework — AXI, Avalon, UART, Wishbone bus masters"

  - namespace: openhwgroup
    url: https://github.com/openhwgroup/cva6.git
    tag: v5.3.0
    license: Apache-2.0
    description: "CVA6 RISC-V CPU — 6-stage pipeline, RV32/64, Linux-capable"

  - namespace: neorv32
    url: https://github.com/stnolting/neorv32.git
    tag: v1.9.9
    license: BSD-3-Clause
    description: "NEORV32 RISC-V SoC — 32-bit MCU-class CPU + peripherals, pure VHDL-2008"
